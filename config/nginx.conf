user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    access_log /var/log/nginx/access.log;

    server {
        listen 8080;
        server_name _;

        # ── Dashboard (exact root) ─────────────────────────────────────────────
        location = / {
            root /opt/sandbox;
            try_files /index.html =404;
        }

        # ── noVNC static files ─────────────────────────────────────────────────
        location /vnc/ {
            alias /opt/novnc/;
            index vnc.html;
        }

        # ── VNC WebSocket stream ───────────────────────────────────────────────
        location /websockify {
            proxy_pass http://127.0.0.1:6080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_read_timeout  86400;
            proxy_send_timeout  86400;
        }

        # ── Terminal (ttyd) ────────────────────────────────────────────────────
        location /terminal/ {
            proxy_pass http://127.0.0.1:7681;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_read_timeout  86400;
            proxy_send_timeout  86400;
        }

        # ── code-server entry point (strips /editor/ prefix) ──────────────────
        # code-server has no --base-path; nginx strips the prefix here so
        # code-server sees / internally. Its assets (/static/, /api/, etc.)
        # are served by the catch-all below without any prefix stripping.
        location /editor/ {
            proxy_pass http://127.0.0.1:8443/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_read_timeout  86400;
            proxy_send_timeout  86400;
        }

        # ── code-server catch-all (assets, API, WebSocket after redirect) ──────
        location / {
            proxy_pass http://127.0.0.1:8443;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_read_timeout  86400;
            proxy_send_timeout  86400;
        }
    }
}
